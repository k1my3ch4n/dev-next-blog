name: auto_deploy
description: GCP Cloud Run 자동 배포

inputs:
  package:
    description: 배포할 패키지명
    required: true
  gcp_region:
    description: GCP 리전
    required: true
  gcp_project_id:
    description: GCP 프로젝트 ID
    required: true
  gcp_service_account_key:
    description: GCP 서비스 계정 키
    required: true

runs:
  using: composite
  steps:
    - name: Authenticate with Google Cloud
      id: authenticate_with_google_cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ inputs.gcp_service_account_key }}

    - name: Configure Google Cloud
      id: configure_google_cloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      id: configure_docker
      run: |
        gcloud auth configure-docker ${{inputs.gcp_region}}-docker.pkg.dev
      shell: bash

    - name: Fetch DB Secrets for Blog Build
      id: fetch_db_secrets
      if: ${{ inputs.package == 'blog' }}
      run: |
        set -euo pipefail
        echo "DB_USER=$(gcloud secrets versions access latest --secret=db-user)" >> $GITHUB_ENV
        echo "DB_HOST=$(gcloud secrets versions access latest --secret=db-host)" >> $GITHUB_ENV
        echo "DB_NAME=$(gcloud secrets versions access latest --secret=db-name)" >> $GITHUB_ENV
        echo "DB_PASSWORD=$(gcloud secrets versions access latest --secret=db-password)" >> $GITHUB_ENV
        echo "DB_PORT=$(gcloud secrets versions access latest --secret=db-port)" >> $GITHUB_ENV
      shell: bash

    - name: Docker Build and Push Image
      id: docker_build_and_push_image
      run: |
        IMAGE_NAME="${{inputs.gcp_region}}-docker.pkg.dev/${{inputs.gcp_project_id}}/monorepo-${{inputs.package}}/deploy"

        if [ "${{inputs.package}}" = "blog" ]; then
          docker build \
            --build-arg DB_USER="$DB_USER" \
            --build-arg DB_HOST="$DB_HOST" \
            --build-arg DB_NAME="$DB_NAME" \
            --build-arg DB_PASSWORD="$DB_PASSWORD" \
            --build-arg DB_PORT="$DB_PORT" \
            -t $IMAGE_NAME:latest -f apps/${{inputs.package}}/Dockerfile .
        else
          docker build \
            -t $IMAGE_NAME:latest -f apps/${{inputs.package}}/Dockerfile .
        fi

        docker push $IMAGE_NAME:latest
      shell: bash

    - name: Deploy to Cloud Run (Blog)
      if: ${{ inputs.package == 'blog' }}
      run: |
        gcloud run deploy ${{inputs.package}} \
          --image=${{inputs.gcp_region}}-docker.pkg.dev/${{inputs.gcp_project_id}}/monorepo-${{inputs.package}}/deploy:latest \
          --region=${{inputs.gcp_region}} \
          --platform=managed \
          --allow-unauthenticated \
          --set-secrets=DB_USER=db-user:latest,DB_HOST=db-host:latest,DB_NAME=db-name:latest,DB_PASSWORD=db-password:latest,DB_PORT=db-port:latest
      shell: bash

    - name: Deploy to Cloud Run
      if: ${{ inputs.package != 'blog' }}
      run: |
        gcloud run deploy ${{inputs.package}} \
          --image=${{inputs.gcp_region}}-docker.pkg.dev/${{inputs.gcp_project_id}}/monorepo-${{inputs.package}}/deploy:latest \
          --region=${{inputs.gcp_region}} \
          --platform=managed \
          --allow-unauthenticated
      shell: bash
